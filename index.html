<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veda App - Final Fix</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; height: 100vh; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; width: 90%; max-width: 600px; margin-top: 20px; text-align: center; }
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #4ecca3; background: #1e293b; color: white; font-size: 1rem; }
        #chat { flex: 1; width: 90%; max-width: 600px; overflow-y: auto; margin: 20px 0; padding: 10px; display: flex; flex-direction: column; }
        .msg { padding: 12px; margin: 8px 0; border-radius: 12px; background: rgba(255,255,255,0.1); line-height: 1.5; white-space: pre-wrap; }
        .user { background: rgba(59, 130, 246, 0.3); align-self: flex-end; }
        .error { color: #ff6b6b; border: 1px solid #ff6b6b; font-size: 0.8rem; }
        button { padding: 12px 25px; border-radius: 8px; background: #4ecca3; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>

    <div class="glass">
        <h2 style="margin:0 0 10px 0;">Veda App</h2>
        <input type="password" id="key" placeholder="Paste Gemini API Key">
        <br>
        <button onclick="localStorage.clear(); location.reload();" style="background:transparent; color:#ff6b6b; font-size:0.7rem; padding:5px; border:1px solid #ff6b6b;">Clear Saved Key</button>
    </div>

    <div id="chat">
        <div class="msg">Try typing "Hello" once you paste the key.</div>
    </div>

    <div class="glass" style="margin-bottom: 30px; display: flex; gap: 10px;">
        <input type="text" id="userInput" placeholder="Ask Veda..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">Send</button>
    </div>

            const saved = localStorage.getItem('v_key');
            if (saved) document.getElementById('key').value = saved;
        };
