<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Veda — Ancient Wisdom</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
  :root {
    --glass: rgba(26, 18, 8, 0.85);
    --gold: #C9922A;
    --saffron: #E8720C;
    --parchment: #F5E6C8;
    --deep: #0D0A05;
  }

  body {
    background: radial-gradient(circle at top, #1A1208 0%, #0D0A05 100%);
    color: var(--parchment);
    font-family: 'EB Garamond', serif;
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  header {
    padding: 20px;
    text-align: center;
  }

  h1 {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    letter-spacing: 0.3em;
    margin: 0;
    font-size: 1.5rem;
    text-shadow: 0 0 15px rgba(201, 146, 42, 0.4);
  }

  /* Main App Container */
  .chat-container {
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(201, 146, 42, 0.2);
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-width: 650px;
    flex: 1;
    display: flex;
    flex-direction: column;
    box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
  }

  #chat-history {
    flex: 1;
    overflow-y: auto;
    padding: 25px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Answer Formatting */
  .message.assistant {
    background: rgba(255, 255, 255, 0.03);
    border-left: 2px solid var(--saffron);
    padding: 20px;
    border-radius: 12px;
    line-height: 1.7;
    font-size: 1.15rem;
    animation: fadeIn 0.5s ease;
  }

  .message.user {
    align-self: flex-end;
    color: var(--gold);
    font-style: italic;
    font-size: 1rem;
    opacity: 0.8;
  }

  /* Input Style */
  .input-area {
    padding: 20px 25px 40px;
    background: rgba(0,0,0,0.4);
    display: flex;
    gap: 12px;
  }

  input[type="text"] {
    flex: 1;
    background: rgba(245, 230, 200, 0.05);
    border: 1px solid rgba(201, 146, 42, 0.3);
    border-radius: 15px;
    color: var(--parchment);
    padding: 15px;
    font-size: 1rem;
    outline: none;
  }

  button {
    background: linear-gradient(135deg, var(--saffron), var(--gold));
    border: none;
    border-radius: 15px;
    width: 50px;
    color: var(--deep);
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s;
  }

  button:active { transform: scale(0.9); }

  /* API Key Modal */
  #key-modal {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.9);
    display: none; align-items: center; justify-content: center; z-index: 1000;
  }

  .modal-content {
    background: var(--glass);
    padding: 30px;
    border-radius: 20px;
    border: 1px solid var(--gold);
    text-align: center;
    max-width: 80%;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<header>
  <h1>VEDA</h1>
</header>

<div class="chat-container">
  <div id="chat-history"></div>
  <div class="input-area">
    <input type="text" id="user-input" placeholder="Ask for wisdom..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<div id="key-modal">
  <div class="modal-content">
    <h3 style="font-family:Cinzel; color:var(--gold)">Connect your API Key</h3>
    <input type="password" id="api-key-input" placeholder="sk-ant-..." style="width:100%; margin: 15px 0; padding:10px; border-radius:8px; border:1px solid var(--gold); background:transparent; color:white;">
    <button onclick="saveKey()" style="width:100%; height:40px;">INVOKE</button>
  </div>
</div>

<script>
  let apiKey = localStorage.getItem('veda_api_key');
  if (!apiKey) document.getElementById('key-modal').style.display = 'flex';

  function saveKey() {
    const val = document.getElementById('api-key-input').value;
    if (val) {
      localStorage.setItem('veda_api_key', val);
      apiKey = val;
      document.getElementById('key-modal').style.display = 'none';
    }
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const history = document.getElementById('chat-history');
    if (!input.value || !apiKey) return;

    const userText = input.value;
    history.innerHTML += `<div class="message user">${userText}</div>`;
    input.value = '';

    const responseDiv = document.createElement('div');
    responseDiv.className = 'message assistant';
    responseDiv.innerHTML = "<i>Consulting the ancient scrolls...</i>";
    history.appendChild(responseDiv);
    history.scrollTop = history.scrollHeight;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-5-20250929",
          max_tokens: 2000,
          messages: [{role: "user", content: userText}]
        })
      });

      const data = await response.json();
      responseDiv.innerHTML = marked.parse(data.content[0].text);
    } catch (err) {
      responseDiv.innerHTML = "The connection to the oracle was severed.";
    }
    history.scrollTop = history.scrollHeight;
  }
</script>
</body>
</html>
