<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veda App - Pro</title>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: white; height: 100vh; display: flex; flex-direction: column; align-items: center;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px;
        }
        header { width: 90%; max-width: 700px; margin-top: 20px; padding: 15px; text-align: center; }
        .key-area { margin-top: 10px; display: flex; gap: 5px; justify-content: center; align-items: center; }
        input[type="password"] {
            background: rgba(0,0,0,0.3); border: 1px solid #4ecca3;
            color: #4ecca3; padding: 8px; border-radius: 8px; font-size: 0.8rem; width: 250px; text-align: center;
        }
        #chat-display {
            flex: 1; width: 90%; max-width: 700px; margin: 20px 0; padding: 15px;
            overflow-y: auto; display: flex; flex-direction: column; gap: 12px;
        }
        .message { padding: 12px; border-radius: 12px; max-width: 85%; line-height: 1.5; white-space: pre-wrap; }
        .user-msg { align-self: flex-end; background: rgba(59, 130, 246, 0.2); border: 1px solid rgba(59, 130, 246, 0.3); }
        .ai-msg { align-self: flex-start; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-area { width: 90%; max-width: 700px; margin-bottom: 25px; padding: 12px; display: flex; gap: 8px; }
        #userInput { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 1rem; }
        button { background: #4ecca3; border: none; padding: 8px 18px; border-radius: 10px; color: #0f172a; font-weight: 600; cursor: pointer; }
        .error-text { color: #ff6b6b; font-size: 0.8rem; margin-top: 5px; }
    </style>
</head>
<body>

    <header class="glass-panel">
        <h2 style="margin:0">Veda App</h2>
        <div class="key-area">
            <input type="password" id="apiKey" placeholder="Paste Gemini API Key">
        </div>
        <div id="statusInfo" style="font-size: 0.7rem; opacity: 0.5; margin-top: 5px;">Key is stored only in this browser</div>
    </header>

    <div id="chat-display">
        <div class="message ai-msg">System Ready. Paste your key and let's test the connection again.</div>
    </div>

    <div class="input-area glass-panel">
        <input type="text" id="userInput" placeholder="Ask anything..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        window.onload = function() {
            const savedKey = localStorage.getItem('veda_gemini_key');
            if (savedKey) document.getElementById('apiKey').value = savedKey;
        };

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const keyInput = document.getElementById('apiKey');
            const display = document.getElementById('chat-display');

            const key = keyInput.value.trim(); // TRIMS SPACES AUTOMATICALLY
            if (!input.value.trim()) return;
            if (!key) { alert("Please paste your API key!"); return; }

            localStorage.setItem('veda_gemini_key', key);

            const userDiv = document.createElement('div');
            userDiv.className = 'message user-msg';
            userDiv.innerText = input.value;
            display.appendChild(userDiv);

            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message ai-msg';
            loadingDiv.innerText = "Thinking...";
            display.appendChild(loadingDiv);
            display.scrollTop = display.scrollHeight;

            const text = input.value;
            input.value = "";

            try {
                // Using the most stable Gemini 1.5 Flash model
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });

                const data = await response.json();
                
                if (data.error) {
                    loadingDiv.innerHTML = `<span class="error-text">Google Error: ${data.error.message}</span>`;
                } else {
                    loadingDiv.innerText = data.candidates[0].content.parts[0].text;
                }
            } catch (error) {
                loadingDiv.innerText = "Connection Failed. Check your internet or Mac settings.";
            }
            display.scrollTop = display.scrollHeight;
        }
    </script>
</body>
</html>
