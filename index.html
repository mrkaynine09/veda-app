<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veda Zen</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fcfaf6; --text: #333333; --panel: #ffffff; }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; align-items: center;
            height: 100vh;
        }
        header {
            width: 90%; max-width: 650px;
            margin-top: 40px;
            text-align: center;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            padding-bottom: 20px;
            flex-shrink: 0;
        }
        .om { font-family: 'Cormorant Garamond', serif; font-size: 3.5rem; margin-bottom: 6px; opacity: 0.85; }
        .title { font-size: 0.8rem; font-weight: 500; text-transform: uppercase; letter-spacing: 5px; opacity: 0.35; margin-bottom: 14px; }
        .key-box {
            font-size: 0.78rem; width: 260px;
            border: 1px solid rgba(0,0,0,0.1); border-radius: 8px;
            padding: 9px 12px; background: white;
            text-align: center; outline: none;
            font-family: inherit; color: var(--text);
            transition: border-color 0.2s;
        }
        .key-box:focus { border-color: rgba(0,0,0,0.25); }
        #chat {
            flex: 1; width: 90%; max-width: 650px;
            overflow-y: auto; padding: 24px 0;
            display: flex; flex-direction: column; gap: 18px;
        }
        .msg {
            padding: 15px 20px; border-radius: 16px;
            max-width: 85%; line-height: 1.65; font-size: 1rem;
            white-space: pre-wrap;
        }
        .user {
            align-self: flex-end;
            background: rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.06);
        }
        .ai {
            align-self: flex-start;
            background: var(--panel);
            border: 1px solid rgba(0,0,0,0.04);
            box-shadow: 0 8px 30px rgba(0,0,0,0.05);
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
        }
        .ai.error { color: #c0392b; font-family: 'Inter', sans-serif; font-size: 0.9rem; }
        .disclaimer {
            font-size: 0.7rem; opacity: 0.35; text-align: center;
            margin-top: -10px; margin-bottom: 6px;
            font-family: 'Inter', sans-serif;
        }
        .input-bar {
            width: 90%; max-width: 650px; margin-bottom: 10px;
            background: var(--panel); padding: 10px 14px;
            border-radius: 18px; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.07);
            border: 1px solid rgba(0,0,0,0.04); flex-shrink: 0;
        }
        input[type="text"] {
            flex: 1; border: none; outline: none;
            padding: 10px; font-size: 1rem;
            font-family: inherit; background: transparent; color: var(--text);
        }
        button {
            background: var(--text); color: var(--bg);
            border: none; padding: 11px 24px;
            border-radius: 12px; font-weight: 600;
            cursor: pointer; font-size: 0.9rem;
            transition: opacity 0.15s;
        }
        button:hover { opacity: 0.75; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body>

<header>
    <div class="om">ॐ</div>
    <div class="title">Veda</div>
    <input type="password" id="key" class="key-box" placeholder="Paste Anthropic API Key">
</header>

<div id="chat">
    <div class="msg ai">Namaste. Paste your Anthropic API key above, then ask me anything — about dharma, the self, or the nature of reality.</div>
</div>

<div class="input-bar">
    <input type="text" id="userInput" placeholder="Ask Veda..." onkeypress="if(event.key==='Enter') send()">
    <button id="sendBtn" onclick="send()">Send</button>
</div>
<div class="disclaimer">Veda may make mistakes. Always verify with original texts.</div>

<script>
    const history = [];

    // ✅ IMPROVEMENT 1: Stricter system prompt — tells the model to admit uncertainty
    const SYSTEM_PROMPT = `You are Veda, a serene and wise spiritual guide rooted in the teachings of ancient Indian philosophy — the Vedas, Upanishads, Bhagavad Gita, and Vedanta.

You speak with calm, compassionate clarity. You weave in Sanskrit terms where relevant (with gentle explanations).
You help seekers explore dharma, karma, the nature of the self (Atman), consciousness, meditation, and the path to inner peace.
Keep responses warm, thoughtful, and concise — never preachy. You are a guide, not a preacher.

IMPORTANT RULES FOR ACCURACY:
- Never fabricate Sanskrit verses or slokas. Only quote verses you are certain about.
- Never attribute a quote to a specific text (e.g. Gita Chapter 2, Verse 47) unless you are fully certain it is correct.
- If you are unsure about something, say so clearly: "I'm not certain, but..." or "You may want to verify this in the original text."
- It is better to say less and be accurate than to say more and be wrong.
- Never invent names of sages, texts, or concepts.`;

    window.onload = () => {
        const saved = sessionStorage.getItem('v_key');
        if (saved) document.getElementById('key').value = saved;
    };

    async function send() {
        const input = document.getElementById('userInput');
        const keyInput = document.getElementById('key');
        const btn = document.getElementById('sendBtn');
        const chat = document.getElementById('chat');

        const key = keyInput.value.trim();
        const text = input.value.trim();
        if (!text || !key) return;

        sessionStorage.setItem('v_key', key);

        const uMsg = document.createElement('div');
        uMsg.className = 'msg user';
        uMsg.innerText = text;
        chat.appendChild(uMsg);

        const aMsg = document.createElement('div');
        aMsg.className = 'msg ai';
        aMsg.innerText = '…';
        chat.appendChild(aMsg);
        chat.scrollTop = chat.scrollHeight;

        input.value = '';
        btn.disabled = true;

        history.push({ role: 'user', content: text });

        try {
            const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': key,
                    'anthropic-version': '2023-06-01',
                    'anthropic-dangerous-direct-browser-access': 'true'
                },
                body: JSON.stringify({
                    // ✅ IMPROVEMENT 2: Upgraded from haiku to sonnet — much more accurate
                    model: 'claude-sonnet-4-5',
                    // ✅ IMPROVEMENT 3: Lower max_tokens — shorter answers = less drift
                    max_tokens: 512,
                    system: SYSTEM_PROMPT,
                    messages: history
                })
            });

            const data = await response.json();

            if (data.error) {
                aMsg.classList.add('error');
                aMsg.innerText = `Error: ${data.error.message}`;
                history.pop();
            } else {
                const reply = data.content[0].text;
                aMsg.innerText = reply;
                history.push({ role: 'assistant', content: reply });
            }

        } catch (err) {
            aMsg.classList.add('error');
            aMsg.innerText = 'Connection error: ' + err.message;
            history.pop();
        }

        btn.disabled = false;
        chat.scrollTop = chat.scrollHeight;
    }
</script>
</body>
</html>
