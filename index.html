<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veda App</title>
    <style>
        /* 1. BACKGROUND & LAYOUT */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 2. GLASSMORPHISM STYLE */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* 3. HEADER & SELECTOR */
        header {
            width: 90%;
            max-width: 800px;
            margin-top: 20px;
            padding: 20px;
            text-align: center;
        }

        .model-selector {
            margin-top: 15px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 10px;
            cursor: pointer;
        }

        /* 4. CHAT DISPLAY AREA */
        #chat-display {
            flex: 1;
            width: 90%;
            max-width: 800px;
            margin: 20px 0;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            padding: 12px 18px;
            border-radius: 15px;
            max-width: 80%;
        }

        .user-msg {
            align-self: flex-end;
            background: rgba(100, 150, 255, 0.2);
            border: 1px solid rgba(100, 150, 255, 0.3);
        }

        .ai-msg {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
        }

        /* 5. FIXED CHAT BOX (BOTTOM) */
        .input-area {
            width: 90%;
            max-width: 800px;
            margin-bottom: 30px;
            padding: 15px;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px;
            border-radius: 10px;
            color: white;
            outline: none;
        }

        button {
            background: #4ecca3;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #45b391;
            transform: translateY(-2px);
        }

        /* FOOTER */
        footer {
            font-size: 0.8rem;
            opacity: 0.6;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <header class="glass-panel">
        <h1>Veda App</h1>
        <p>AI Comparison Interface</p>
        <select id="modelSelect" class="model-selector">
            <option value="gemini">Gemini API</option>
            <option value="claude">Claude API</option>
        </select>
    </header>

    <div id="chat-display">
        <div class="message ai-msg">Hello! Select a model above and type a message to start testing.</div>
    </div>

    <div class="input-area glass-panel">
        <input type="text" id="userInput" placeholder="Type your message here..." />
        <button onclick="sendMessage()">Send</button>
    </div>

    <footer>Veda App v1.0</footer>

    <script>
        // THIS IS THE BRAIN OF THE APP
        function sendMessage() {
            const input = document.getElementById('userInput');
            const display = document.getElementById('chat-display');
            const model = document.getElementById('modelSelect').value;

            if (input.value.trim() === "") return;

            // 1. Add User Message to screen
            const userDiv = document.createElement('div');
            userDiv.className = 'message user-msg';
            userDiv.innerText = input.value;
            display.appendChild(userDiv);

            // 2. Simulate AI Response (We will connect your real API keys next)
            const aiDiv = document.createElement('div');
            aiDiv.className = 'message ai-msg';
            aiDiv.innerText = `[Responding via ${model.toUpperCase()}...] Connection test successful. We need to plug in your API keys in the next step.`;
            
            setTimeout(() => {
                display.appendChild(aiDiv);
                display.scrollTop = display.scrollHeight;
            }, 600);

            input.value = ""; // Clear input
        }
    </script>
</body>
</html>
