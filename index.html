<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veda App - Live</title>
    <style>
        body {
            margin: 0; padding: 0; font-family: sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: white; height: 100vh; display: flex; flex-direction: column; align-items: center;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px;
        }
        header { width: 90%; max-width: 700px; margin-top: 20px; padding: 20px; text-align: center; }
        .key-area { margin-top: 15px; }
        input[type="password"] {
            background: rgba(0,0,0,0.5); border: 1px solid #4ecca3; color: white;
            padding: 8px; border-radius: 8px; width: 80%; text-align: center;
        }
        #chat-display {
            flex: 1; width: 90%; max-width: 700px; margin: 20px 0; padding: 20px;
            overflow-y: auto; display: flex; flex-direction: column; gap: 15px;
        }
        .message { padding: 12px; border-radius: 12px; max-width: 80%; }
        .user-msg { align-self: flex-end; background: rgba(59, 130, 246, 0.3); }
        .ai-msg { align-self: flex-start; background: rgba(255, 255, 255, 0.1); }
        .input-area { width: 90%; max-width: 700px; margin-bottom: 30px; padding: 15px; display: flex; gap: 10px; }
        #userInput { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 1rem; }
        button { background: #4ecca3; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header class="glass-panel">
        <h1>Veda App</h1>
        <div class="key-area">
            <input type="password" id="apiKey" placeholder="Paste NEW Gemini API Key Here">
        </div>
    </header>

    <div id="chat-display">
        <div class="message ai-msg">1. Delete your old key from AI Studio.<br>2. Create a NEW key.<br>3. Paste it in the box above.<br>4. Start chatting!</div>
    </div>

    <div class="input-area glass-panel">
        <input type="text" id="userInput" placeholder="Ask Veda App..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const key = document.getElementById('apiKey').value;
            const display = document.getElementById('chat-display');

            if (!input.value.trim() || !key) {
                alert("Please enter both a message and your API Key!");
                return;
            }

            const userDiv = document.createElement('div');
            userDiv.className = 'message user-msg';
            userDiv.innerText = input.value;
            display.appendChild(userDiv);

            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message ai-msg';
            loadingDiv.innerText = "Thinking...";
            display.appendChild(loadingDiv);

            const text = input.value;
            input.value = "";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });
                const data = await response.json();
                loadingDiv.innerText = data.candidates[0].content.parts[0].text;
            } catch (e) {
                loadingDiv.innerText = "Error! Make sure your API key is correct.";
            }
            display.scrollTop = display.scrollHeight;
        }
    </script>
</body>
</html>
