<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Veda — Ancient Wisdom</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
  :root {
    --glass: rgba(26, 18, 8, 0.9);
    --gold: #C9922A;
    --saffron: #E8720C;
    --parchment: #F5E6C8;
    --deep: #0D0A05;
  }

  /* 1. Fix the Scroll: Allow body to scroll naturally */
  body {
    background: radial-gradient(circle at top, #1A1208 0%, #0D0A05 100%);
    background-attachment: fixed;
    color: var(--parchment);
    font-family: 'EB Garamond', serif;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  header {
    width: 100%;
    padding: 30px 0;
    text-align: center;
    position: sticky;
    top: 0;
    background: rgba(13, 10, 5, 0.8);
    backdrop-filter: blur(10px);
    z-index: 100;
  }

  h1 {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    letter-spacing: 0.4em;
    margin: 0;
    font-size: 1.8rem;
  }

  /* 2. Chat Area: Full width, natural height */
  #chat-history {
    width: 100%;
    max-width: 800px;
    padding: 20px 20px 150px; /* Large bottom padding for the input box */
    display: flex;
    flex-direction: column;
    gap: 30px;
  }

  .message.assistant {
    background: rgba(255, 255, 255, 0.03);
    border-radius: 16px;
    padding: 25px;
    line-height: 1.8;
    font-size: 1.2rem;
    border: 1px solid rgba(201, 146, 42, 0.1);
    animation: fadeIn 0.6s ease;
  }

  .message.user {
    align-self: flex-end;
    max-width: 80%;
    background: rgba(201, 146, 42, 0.1);
    padding: 12px 20px;
    border-radius: 20px;
    color: var(--gold);
  }

  /* 3. Claude-style Fixed Bottom Input */
  .footer-input-container {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: linear-gradient(transparent, var(--deep) 30%);
    padding-bottom: 30px;
    z-index: 1000;
  }

  .input-wrapper {
    width: 90%;
    max-width: 750px;
    background: var(--glass);
    border: 1px solid rgba(201, 146, 42, 0.4);
    border-radius: 24px;
    display: flex;
    align-items: center;
    padding: 10px 20px;
    backdrop-filter: blur(20px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  select#model-select {
    background: transparent;
    color: var(--gold);
    border: none;
    font-family: 'Cinzel';
    font-size: 0.8rem;
    cursor: pointer;
    margin-right: 10px;
    outline: none;
  }

  input[type="text"] {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--parchment);
    padding: 15px;
    font-size: 1.1rem;
    outline: none;
  }

  .send-btn {
    background: var(--gold);
    color: var(--deep);
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-weight: bold;
    cursor: pointer;
  }

  /* 4. The Footer Section */
  .end-of-wisdom {
    padding: 60px 0 180px;
    text-align: center;
    color: rgba(201, 146, 42, 0.3);
    font-family: 'Cinzel';
    letter-spacing: 0.2em;
    font-size: 0.7rem;
    width: 100%;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
</style>
</head>
<body>

<header>
  <h1>VEDA</h1>
</header>

<div id="chat-history">
  </div>

<div class="end-of-wisdom">
  ✧ END OF TRANSMISSION ✧<br>
  The Veda flows eternally.
</div>

<div class="footer-input-container">
  <div class="input-wrapper">
    <select id="model-select">
      <option value="claude">Claude 4.5</option>
      <option value="gemini">Gemini Flash</option>
    </select>
    <input type="text" id="user-input" placeholder="Ask for wisdom..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
  <p style="font-size: 0.6rem; margin-top: 10px; opacity: 0.4;">Veda v1.0 • Built for Enlightenment</p>
</div>

<script>
  // Replace these with your real keys or use the Modal method from before
  const CLAUDE_KEY = localStorage.getItem('veda_claude_key');
  const GEMINI_KEY = localStorage.getItem('veda_gemini_key');

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const history = document.getElementById('chat-history');
    const modelType = document.getElementById('model-select').value;
    
    if (!input.value) return;

    const userText = input.value;
    history.innerHTML += `<div class="message user">${userText}</div>`;
    input.value = '';

    const responseDiv = document.createElement('div');
    responseDiv.className = 'message assistant';
    responseDiv.innerHTML = "<i>Consulting the source...</i>";
    history.appendChild(responseDiv);

    // Auto-scroll to bottom
    window.scrollTo(0, document.body.scrollHeight);

    try {
      if (modelType === 'claude') {
        const resp = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": CLAUDE_KEY,
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true"
          },
          body: JSON.stringify({
            model: "claude-sonnet-4-5-20250929",
            max_tokens: 2000,
            messages: [{role: "user", content: userText}]
          })
        });
        const data = await resp.json();
        responseDiv.innerHTML = marked.parse(data.content[0].text);
      } else {
        const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
          method: "POST",
          body: JSON.stringify({ contents: [{ parts: [{ text: userText }] }] })
        });
        const data = await resp.json();
        responseDiv.innerHTML = marked.parse(data.candidates[0].content.parts[0].text);
      }
    } catch (err) {
      responseDiv.innerHTML = "Connection failed. Please check your API keys.";
    }
    window.scrollTo(0, document.body.scrollHeight);
  }
</script>

</body>
</html>
