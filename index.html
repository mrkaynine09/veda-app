<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veda App - Universal</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; height: 100vh; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; width: 90%; max-width: 600px; margin-top: 20px; text-align: center; }
        input { width: 80%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #4ecca3; background: #1e293b; color: white; }
        #chat { flex: 1; width: 90%; max-width: 600px; overflow-y: auto; margin: 20px 0; }
        .msg { padding: 10px; margin: 5px 0; border-radius: 10px; background: rgba(255,255,255,0.1); }
        .user { background: rgba(59, 130, 246, 0.2); text-align: right; }
    </style>
</head>
<body>
    <div class="glass">
        <h2>Veda App</h2>
        <input type="password" id="key" placeholder="Enter API Key Here">
    </div>
    <div id="chat"></div>
    <div class="glass" style="margin-bottom: 20px;">
        <input type="text" id="userInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()" style="padding: 10px 20px; border-radius: 8px; background: #4ecca3; border: none; font-weight: bold; cursor: pointer;">Send</button>
    </div>

    <script>
        window.onload = () => { document.getElementById('key').value = localStorage.getItem('v_key') || ''; };

        async function send() {
            const i = document.getElementById('userInput');
            const k = document.getElementById('key').value.trim();
            const c = document.getElementById('chat');
            if (!i.value || !k) return;

            localStorage.setItem('v_key', k);
            c.innerHTML += `<div class="msg user">${i.value}</div>`;
            const loading = document.createElement('div');
            loading.className = 'msg';
            loading.innerText = "Connecting to Gemini...";
            c.appendChild(loading);
            
            const prompt = i.value;
            i.value = "";

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${k}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                if (data.error) {
                    loading.style.color = "#ff6b6b";
                    loading.innerText = "Google says: " + data.error.message;
                } else {
                    loading.innerText = data.candidates[0].content.parts[0].text;
                }
            } catch (e) {
                loading.innerText = "Fatal Error. Check console.";
            }
            c.scrollTop = c.scrollHeight;
        }
    </script>
</body>
</html>
